version: '3.8'

services:
  # 1. Backend Server
  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: recruitmatrix-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./server/.env
    networks:
      - recruitmatrix-network

  # 2. Database Seeder (Run this manually using: docker compose up seed)
  seed:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: recruitmatrix-seeder
    profiles:
      - manual
    command: npm run seed
    env_file:
      - ./server/.env
    networks:
      - recruitmatrix-network

  # 3. Admin Panel (Internal Staff)
  admin-panel:
    build: 
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: recruitmatrix-admin-panel
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recruitmatrix-network

  # 4. Company Panel (Client Portal)
  company-panel:
    build: 
      context: ./company-panel
      dockerfile: Dockerfile
    container_name: recruitmatrix-company-panel
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - recruitmatrix-network

  # 5. Static Website (Public Homepage)
  website:
    build: 
      context: ./website
      dockerfile: Dockerfile
    container_name: recruitmatrix-website
    restart: always
    ports:
      - "8082:80"
    networks:
      - recruitmatrix-network

networks:
  recruitmatrix-network:
    driver: bridge
